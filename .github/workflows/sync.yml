name: Sync Fork

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/Olamgir2002/url.git
          git fetch upstream
          git checkout main
          git merge upstream/main
          git push origin main
